name: Build and Deploy to Azure

on:
  workflow_run:
    workflows: ["Test Suite"]
    types: [completed]

env:
  REGISTRY: quizapppsi.azurecr.io
  RESOURCE_GROUP: quizapp-rg
  CONTAINER_APP: quizapp

jobs:
  build-and-deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ env.REGISTRY }}/quizapp-backend:latest

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ env.REGISTRY }}/quizapp-frontend:latest
          build-args: VITE_API_URL=/api

      - name: Build and push nginx proxy
        uses: docker/build-push-action@v5
        with:
          context: .
          file: nginx/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/quizapp-proxy:latest

