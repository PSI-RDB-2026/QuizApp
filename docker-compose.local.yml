services:
  backend:
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    postgres-test:
      image: postgres:16-alpine
      environment:
        POSTGRES_DB: quiz_app_test
        POSTGRES_USER: test_user
        POSTGRES_PASSWORD: test_password
      ports:
        - "5433:5432"
      volumes:
        - postgres_test_data:/var/lib/postgresql/data
        - ./backend/db/sql:/docker-entrypoint-initdb.d
      healthcheck:
        test: ["CMD-SHELL", "pg_isready -U test_user -d quiz_app_test"]
        interval: 10s
        timeout: 5s
        retries: 5
      profiles:
        - test

  volumes:
    postgres_test_data: