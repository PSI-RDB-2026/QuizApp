[pytest]
# Test discovery patterns
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Asyncio configuration for pytest-asyncio
asyncio_mode = auto

# Coverage configuration
addopts = 
    --cov=services
    --cov=routers
    --cov=models
    --cov-report=term-missing
    --cov-report=html
    --strict-markers

# Markers for test categorization
markers =
    unit: Unit tests for isolated service logic
    integration: Integration tests for API endpoints
    db: Database integration tests (use Docker PostgreSQL)
    slow: Tests that take longer to run
    auth: Authentication and JWT token tests

# Ignore certain patterns
norecursedirs = __pycache__ .pytest_cache *.egg-info .git

# Show extra test summary info for all test outcomes
console_output_style = progress
