services:
  proxy:
    image: nginx:alpine
    container_name: quizapp-proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx/compose.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    networks:
      - quizapp-network

  postgres:
    image: postgres:15-alpine
    container_name: quizapp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: quizapp
      POSTGRES_PASSWORD: quizapp_pass
      POSTGRES_DB: quizapp
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/sql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quizapp"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - quizapp-network

  pgadmin:
    image: dpage/pgadmin4
    container_name: quizapp-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - quizapp-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: quizapp-backend
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=postgresql+asyncpg://quizapp:quizapp_pass@postgres:5432/quizapp
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - quizapp-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: quizapp-frontend
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - quizapp-network

networks:
  quizapp-network:
    driver: bridge

volumes:
  postgres_data: