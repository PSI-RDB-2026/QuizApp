services:
  proxy:
    image: nginx:alpine
    container_name: quizapp-proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx/compose.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    networks:
      - quizapp-network

  postgres:
    image: postgres:15-alpine
    container_name: quizapp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-quizapp}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-quizapp_pass}"
      POSTGRES_DB: "${POSTGRES_DB:-quizapp}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/db/sql/bootstrap.sql:/docker-entrypoint-initdb.d/00_bootstrap.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quizapp"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - quizapp-network

  pgadmin:
    image: dpage/pgadmin4
    container_name: quizapp-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: "${PGADMIN_DEFAULT_EMAIL:-admin@admin.com}"
      PGADMIN_DEFAULT_PASSWORD: "${PGADMIN_DEFAULT_PASSWORD:-admin}"
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - quizapp-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: quizapp-backend
    environment:
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-quizapp}:${POSTGRES_PASSWORD:-quizapp_pass}@postgres:5432/${POSTGRES_DB:-quizapp}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - quizapp-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      secrets:
        - FIREBASE_API_KEY
        - FIREBASE_AUTH_DOMAIN
        - FIREBASE_PROJECT_ID
        - FIREBASE_STORAGE_BUCKET
        - FIREBASE_MESSAGING_SENDER_ID
        - FIREBASE_APP_ID
        - FIREBASE_MEASUREMENT_ID
    container_name: quizapp-frontend
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - quizapp-network

networks:
  quizapp-network:
    driver: bridge

volumes:
  postgres_data:

secrets:
  FIREBASE_API_KEY:
    environment: FIREBASE_API_KEY
  FIREBASE_AUTH_DOMAIN:
    environment: FIREBASE_AUTH_DOMAIN
  FIREBASE_PROJECT_ID:
    environment: FIREBASE_PROJECT_ID
  FIREBASE_STORAGE_BUCKET:
    environment: FIREBASE_STORAGE_BUCKET
  FIREBASE_MESSAGING_SENDER_ID:
    environment: FIREBASE_MESSAGING_SENDER_ID
  FIREBASE_APP_ID:
    environment: FIREBASE_APP_ID
  FIREBASE_MEASUREMENT_ID:
    environment: FIREBASE_MEASUREMENT_ID